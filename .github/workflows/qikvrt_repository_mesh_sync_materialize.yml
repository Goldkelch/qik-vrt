name: QIK-VRT repository mesh sync materializer

on:
  push:
    branches:
      - automation/repository-mesh-sync-materialize-20260724
    paths:
      - release/repository-mesh-sync-materialize-request.json
      - .github/workflows/qikvrt_repository_mesh_sync_materialize.yml

permissions:
  contents: write

concurrency:
  group: qikvrt-repository-mesh-sync-materializer
  cancel-in-progress: false

jobs:
  materialize:
    if: github.repository == 'Goldkelch/qik-vrt'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out the exact materialization branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Bind materialization to CPython 3.12.13 x64
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12.13'
          architecture: x64

      - name: Patch current status and install the fail-closed common-tag contract
        shell: bash
        run: |
          set -euo pipefail
          python3 -B - <<'PY'
          from __future__ import annotations

          import copy
          import hashlib
          import json
          from pathlib import Path

          request_path = Path('release/repository-mesh-sync-materialize-request.json')
          request = json.loads(request_path.read_text(encoding='utf-8'))
          expected_request = {
              '_license': {
                  'copyright': 'Copyright 2026 Ingolf Lohmann',
                  'license': 'CC-BY-NC-ND-4.0',
                  'classification': 'temporary_repository_materialization_request',
              },
              'schema': 'qikvrt_repository_mesh_sync_materializer_v1',
              'request_id': 'repository-mesh-sync-2026-07-24',
              'action': 'materialize',
              'confirm': 'PREPARE_COMMON_REPOSITORY_MESH_SYNC_CANDIDATE',
              'target_branch': 'automation/repository-mesh-sync-materialize-20260724',
              'tag': 'v2026.07.24-repository-mesh-sync-1.0.0',
              'zenodo_records': [
                  '10.5281/zenodo.21498773',
                  '10.5281/zenodo.21498774',
                  '10.5281/zenodo.21500322',
                  '10.5281/zenodo.21515074',
                  '10.5281/zenodo.21529081',
              ],
          }
          if request != expected_request:
              raise SystemExit('BLOCK: materialization request differs from the fixed contract')

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'BLOCK: expected one replacement anchor in {path}, found {count}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          readme_old = '''### Current release evidence

          | Item | Verified value |
          |---|---|
          | Release | [`v2026.07.22-effect-ack-universality-1.0.0`](https://github.com/Goldkelch/qik-vrt/tree/v2026.07.22-effect-ack-universality-1.0.0) in both repositories |
          | Working paper | [DOI 10.5281/zenodo.21498773](https://doi.org/10.5281/zenodo.21498773) |
          | Software | [DOI 10.5281/zenodo.21498774](https://doi.org/10.5281/zenodo.21498774) |
          | Python tests | 128/128 in twelve modules with test cases |
          | ANSI-C90 model | 2,621,440 valid snapshots; 7,864,387 checks |
          | Draft rendering | Python 3.12.13 and `xml2rfc` 3.34.0; XML/TXT/HTML preserved |
          | GitHub Release object | Intentionally absent; the annotated tag is the release identity |
          | IETF Datatracker | No submission; published Draft `-01` remains byte-identical |
          '''
          readme_new = '''### Current release and synchronized snapshot evidence

          | Item | Verified value |
          |---|---|
          | Scientific release | [`v2026.07.22-effect-ack-universality-1.0.0`](https://github.com/Goldkelch/qik-vrt/tree/v2026.07.22-effect-ack-universality-1.0.0) in both repositories |
          | Repository mesh snapshot | [`v2026.07.24-repository-mesh-sync-1.0.0`](https://github.com/Goldkelch/qik-vrt/tree/v2026.07.24-repository-mesh-sync-1.0.0) in [Authority](https://github.com/Goldkelch/qik-vrt) and [Mirror](https://github.com/ingolf-lohmann/qik-vrt); identical content tree with repository-specific commits |
          | Working paper | [DOI 10.5281/zenodo.21498773](https://doi.org/10.5281/zenodo.21498773) |
          | Software snapshot | [DOI 10.5281/zenodo.21498774](https://doi.org/10.5281/zenodo.21498774) |
          | Official status clarification | [DOI 10.5281/zenodo.21500322](https://doi.org/10.5281/zenodo.21500322) |
          | Completed formal-environment Alpha 3 | [DOI 10.5281/zenodo.21529081](https://doi.org/10.5281/zenodo.21529081) |
          | Charter of Machine-Verifiable Science | [DOI 10.5281/zenodo.21515074](https://doi.org/10.5281/zenodo.21515074) |
          | Python tests | 128/128 in twelve modules with test cases |
          | ANSI-C90 model | 2,621,440 valid snapshots; 7,864,387 checks |
          | Draft rendering | Python 3.12.13 and `xml2rfc` 3.34.0; XML/TXT/HTML preserved |
          | GitHub Release objects | Intentionally absent; the annotated tags are the repository identities |
          | IETF Datatracker | Active individual Internet-Draft revision `-01`; not an RFC or IETF consensus |
          '''
          replace_once('README.md', readme_old, readme_new)

          readme_anchor = '''The exact working paper is archived under
          [DOI 10.5281/zenodo.21498773](https://doi.org/10.5281/zenodo.21498773); the
          corresponding versioned source export is archived under
          [DOI 10.5281/zenodo.21498774](https://doi.org/10.5281/zenodo.21498774).
          '''
          readme_expanded = readme_anchor + '''
          The evidence-bounded official status clarification is archived under
          [DOI 10.5281/zenodo.21500322](https://doi.org/10.5281/zenodo.21500322).
          The latest completed formal-environment snapshot is Alpha 3 under
          [DOI 10.5281/zenodo.21529081](https://doi.org/10.5281/zenodo.21529081),
          and the independent Charter of Machine-Verifiable Science is archived
          under [DOI 10.5281/zenodo.21515074](https://doi.org/10.5281/zenodo.21515074).
          Zenodo persistence establishes identity and fixity of those bytes; it
          does not establish peer review, empirical confirmation, or field-wide adoption.
          '''
          replace_once('README.md', readme_anchor, readme_expanded)

          status_old = '''**Snapshot date:** 2026-07-22

          **Release identity:** annotated tag
          `v2026.07.22-effect-ack-universality-1.0.0` in `Goldkelch/qik-vrt` and
          `ingolf-lohmann/qik-vrt`; working-paper DOI
          `10.5281/zenodo.21498773`; software DOI `10.5281/zenodo.21498774`.

          **Current verified object:** the identical content tree carried by that tag in
          both repositories. Commit identities remain repository-specific; the dedicated
          public finalization evidence records both commit/tree/tag bindings and Zenodo
          file digests without introducing a self-reference into the tagged tree.
          '''
          status_new = '''**Snapshot date:** 2026-07-24

          **Scientific release identity:** annotated tag
          `v2026.07.22-effect-ack-universality-1.0.0` in `Goldkelch/qik-vrt` and
          `ingolf-lohmann/qik-vrt`; working-paper DOI
          `10.5281/zenodo.21498773`; software DOI `10.5281/zenodo.21498774`.

          **Synchronized repository identity:** annotated tag
          `v2026.07.24-repository-mesh-sync-1.0.0` in both repositories. It identifies
          the shared post-release content tree, including dependency-security maintenance,
          authenticated repository-native audio requests, current Zenodo inventory, and
          this status refresh. Commit identities remain repository-specific.

          **Current verified object:** the identical content tree carried by the common
          repository-mesh tag in both repositories. The earlier scientific release tag
          remains immutable and continues to identify the separately archived release.
          '''
          replace_once('STATUS.md', status_old, status_new)

          status_audio_anchor = '''- The release path binds authorization, responsibility, provenance, workflow
          identity, planned asset bytes, local `HEAD`, remote digest evidence, and
          durable publication journals. Negative tests cover malformed, oversized,
          unauthenticated, expired, conflicting, tampered, and timeout inputs.
          '''
          status_audio = status_audio_anchor + '''- The authenticated repository-native audio-request interface binds repository,
          Git-blob SHA, filename, byte count, SHA-256, model identity, and bounded
          transcription parameters before ephemeral processing. It rejects repository
          substitution, traversal, hidden names, unsupported formats, malformed Base64,
          oversized inputs, unknown fields, and byte or digest mismatches.
          '''
          replace_once('STATUS.md', status_audio_anchor, status_audio)

          status_formal_anchor = '''- The reproducible scientific bundle passes its finite-model proof while
          explicitly separating process universalizability, semantic factorization on
          observation fibres, conditional historical inversion, and conditional
          cyberphysical effect control.
          '''
          status_formal = status_formal_anchor + '''- The source-bound Lean formalization now records closed machine-readable status
          for all 20 definition environments and all 20 theorem-like environments,
          materializes 42 strong source bindings, and keeps six conditional claims
          explicitly conditional. This is formal-environment coverage, not empirical
          confirmation of physical or interpretive claims.
          '''
          replace_once('STATUS.md', status_formal_anchor, status_formal)

          external_old = '''## Current external state

          - Both repository `main` branches carry the same release content tree under
            annotated tag `v2026.07.22-effect-ack-universality-1.0.0`.
          - Zenodo publishes the exact working-paper files under DOI
            `10.5281/zenodo.21498773` and the deterministic tagged source-tree export
            under DOI `10.5281/zenodo.21498774`.
          - No GitHub Release object exists for this tag. Tagging and archival publication
            were separate, hash-bound effects.
          - No IETF Datatracker submission was performed. XML, TXT, and HTML rendering
            and validation preserved Draft `-01`; its normative bytes are unchanged.
          - Public machine-readable reservation/finalization evidence is retained on
            branch `qikvrt/zenodo-state` of `Goldkelch/qik-vrt`.
          '''
          external_new = '''## Current external state

          - Both repository `main` branches carry the same current content tree under
            annotated tag `v2026.07.24-repository-mesh-sync-1.0.0`; the Authority and
            Mirror commits differ because their histories remain repository-specific.
          - The immutable scientific release tag
            `v2026.07.22-effect-ack-universality-1.0.0` remains present in both repositories.
          - Zenodo publishes the exact working-paper files under DOI
            `10.5281/zenodo.21498773` and the deterministic tagged source-tree export
            under DOI `10.5281/zenodo.21498774`.
          - The official evidence-boundary status clarification is published under DOI
            `10.5281/zenodo.21500322`.
          - The formalization concept `10.5281/zenodo.21488115` currently reaches the
            independently verified Alpha-3 version DOI `10.5281/zenodo.21529081`.
          - The Charter of Machine-Verifiable Science is published independently under
            DOI `10.5281/zenodo.21515074`.
          - No GitHub Release object is created for either annotated tag. Repository
            tagging and Zenodo archival publication remain separate effects.
          - IETF Datatracker publishes the active individual Internet-Draft revision
            `draft-lohmann-qikvrt-effect-ack-01`; it is neither an RFC nor IETF consensus.
          - Public machine-readable Zenodo reservation, finalization, and anonymous
            verification evidence remains retained on the dedicated QIK-VRT state branches.
          '''
          replace_once('STATUS.md', external_old, external_new)

          changelog_anchor = '''This file summarizes current public milestones. Git history and release pages
          remain the authoritative detailed record.

          '''
          changelog_section = changelog_anchor + '''## 2026.07.24 — synchronized repository mesh snapshot

          - Synchronized the Authority and Mirror repositories through the consolidated
            dependency-security maintenance state and authenticated repository-native
            audio-request interface.
          - Refreshed `README.md` and `STATUS.md` with the published Zenodo status
            clarification, Formalization Alpha 3, and Charter records.
          - Added common annotated tag `v2026.07.24-repository-mesh-sync-1.0.0` only
            after both `main` branches expose the same Git tree and repository integrity
            verifies in each repository.
          - No GitHub Release object or new Zenodo record is created by this synchronization.

          '''
          replace_once('CHANGELOG.md', changelog_anchor, changelog_section)

          schema = {
              '$schema': 'https://json-schema.org/draft/2020-12/schema',
              '$id': 'https://qik-vrt.example/schema/qikvrt-repository-mesh-sync-request-v1.json',
              'title': 'QIK-VRT repository mesh sync tag request',
              'type': 'object',
              'additionalProperties': False,
              'required': [
                  '_license', '$schema_ref', 'schema', 'schema_sha256', 'request_id',
                  'action', 'confirm', 'authorization_payload_sha256',
                  'repository_policy', 'release', 'expected',
              ],
              'properties': {
                  '_license': {'type': 'object'},
                  '$schema_ref': {'const': '../policy/qikvrt-repository-mesh-sync-request.schema.json'},
                  'schema': {'const': 'qikvrt_repository_mesh_sync_request_v1'},
                  'schema_sha256': {'type': 'string', 'pattern': '^[0-9a-f]{64}$'},
                  'request_id': {'const': 'repository-mesh-sync-2026-07-24'},
                  'action': {'enum': ['inactive', 'tag']},
                  'confirm': {'type': 'string'},
                  'authorization_payload_sha256': {'type': 'string', 'pattern': '^[0-9a-f]{64}$'},
                  'repository_policy': {'type': 'object'},
                  'release': {'type': 'object'},
                  'expected': {'type': 'object'},
              },
          }
          schema_path = Path('policy/qikvrt-repository-mesh-sync-request.schema.json')
          schema_path.write_text(
              json.dumps(schema, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
              newline='\n',
          )
          schema_sha256 = hashlib.sha256(schema_path.read_bytes()).hexdigest()

          marker = {
              '_license': {
                  'copyright': 'Copyright 2026 Ingolf Lohmann',
                  'rights_holder': 'Ingolf Lohmann',
                  'license': 'CC-BY-NC-ND-4.0',
                  'license_text_ref': 'LICENSES/CC-BY-NC-ND-4.0.txt',
                  'classification': 'repository_tag_authorization_json',
              },
              '$schema_ref': '../policy/qikvrt-repository-mesh-sync-request.schema.json',
              'schema': 'qikvrt_repository_mesh_sync_request_v1',
              'schema_sha256': schema_sha256,
              'request_id': 'repository-mesh-sync-2026-07-24',
              'action': 'inactive',
              'confirm': 'NOT_AUTHORIZED',
              'authorization_payload_sha256': '',
              'repository_policy': {
                  'authority_repository': 'Goldkelch/qik-vrt',
                  'mirror_repository': 'ingolf-lohmann/qik-vrt',
                  'authorization_branch': 'automation/repository-mesh-sync-tag-20260724',
              },
              'release': {
                  'tag': 'v2026.07.24-repository-mesh-sync-1.0.0',
                  'tagger_name': 'Ingolf Lohmann',
                  'tagger_email': 'ingolf.lohmann@live.com',
                  'tagger_timestamp': '2026-07-24T17:30:00Z',
                  'tag_message': (
                      'QIK-VRT synchronized repository mesh snapshot 1.0.0\n\n'
                      'Common annotated tag for the byte-identical Authority and Mirror '
                      'content tree after dependency-security maintenance, authenticated '
                      'repository-native audio requests, Zenodo inventory refresh, and '
                      'status documentation synchronization. No GitHub Release object and '
                      'no new Zenodo publication are created.'
                  ),
              },
              'expected': {
                  'authority_commit': '0' * 40,
                  'mirror_commit': '0' * 40,
                  'shared_tree': '0' * 40,
              },
          }
          projection = copy.deepcopy(marker)
          projection.pop('authorization_payload_sha256')
          marker['authorization_payload_sha256'] = hashlib.sha256(
              json.dumps(projection, ensure_ascii=False, sort_keys=True, separators=(',', ':')).encode('utf-8')
          ).hexdigest()
          marker_path = Path('release/repository-mesh-sync-request.json')
          marker_path.write_text(
              json.dumps(marker, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
              newline='\n',
          )

          final_workflow_template = r'''# SPDX-License-Identifier: PolyForm-Noncommercial-1.0.0
          # Copyright 2026 Ingolf Lohmann.

          name: QIK-VRT repository mesh sync tag

          on:
            push:
              branches:
                - automation/repository-mesh-sync-tag-20260724
              paths:
                - release/repository-mesh-sync-request.json

          permissions:
            contents: write

          concurrency:
            group: qikvrt-repository-mesh-sync-tag-__REPOSITORY__
            cancel-in-progress: false

          jobs:
            validate-and-tag:
              if: github.repository == 'Goldkelch/qik-vrt' || github.repository == 'ingolf-lohmann/qik-vrt'
              runs-on: ubuntu-24.04
              timeout-minutes: 20
              steps:
                - name: Check out the exact authorization commit
                  uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
                  with:
                    fetch-depth: 2
                    persist-credentials: false

                - name: Validate the marker, both main trees, and repository integrity
                  shell: bash
                  env:
                    GH_API_TOKEN: __OPEN__ github.token }}
                    EVENT_AFTER: __OPEN__ github.event.after }}
                    EVENT_BEFORE: __OPEN__ github.event.before }}
                    EVENT_FORCED: __OPEN__ github.event.forced }}
                    EVENT_REF: __OPEN__ github.ref }}
                  run: |
                    set -euo pipefail
                    python3 -B - <<'PYTAG'
                    from __future__ import annotations

                    import copy
                    import hashlib
                    import json
                    import os
                    import re
                    import subprocess
                    import urllib.error
                    import urllib.parse
                    import urllib.request
                    from pathlib import Path

                    MARKER = Path('release/repository-mesh-sync-request.json')
                    SCHEMA = Path('policy/qikvrt-repository-mesh-sync-request.schema.json')
                    ZERO40 = '0' * 40
                    SHA1 = re.compile(r'[0-9a-f]{40}\Z')
                    REPOSITORIES = ('Goldkelch/qik-vrt', 'ingolf-lohmann/qik-vrt')

                    def fail(message: str) -> None:
                        raise SystemExit('BLOCK: ' + message)

                    def digest(path: Path) -> str:
                        if path.is_symlink() or not path.is_file():
                            fail(f'unsafe or missing required file: {path}')
                        return hashlib.sha256(path.read_bytes()).hexdigest()

                    marker = json.loads(MARKER.read_text(encoding='utf-8'))
                    required = {
                        '_license', '$schema_ref', 'schema', 'schema_sha256', 'request_id',
                        'action', 'confirm', 'authorization_payload_sha256',
                        'repository_policy', 'release', 'expected',
                    }
                    if set(marker) != required:
                        fail('marker keys differ from the closed contract')
                    if marker['$schema_ref'] != '../policy/qikvrt-repository-mesh-sync-request.schema.json':
                        fail('schema reference changed')
                    if marker['schema'] != 'qikvrt_repository_mesh_sync_request_v1':
                        fail('schema name changed')
                    if marker['schema_sha256'] != digest(SCHEMA):
                        fail('schema digest changed')
                    if marker['request_id'] != 'repository-mesh-sync-2026-07-24':
                        fail('request identity changed')
                    policy = {
                        'authority_repository': 'Goldkelch/qik-vrt',
                        'mirror_repository': 'ingolf-lohmann/qik-vrt',
                        'authorization_branch': 'automation/repository-mesh-sync-tag-20260724',
                    }
                    if marker['repository_policy'] != policy:
                        fail('repository policy changed')
                    fixed_release = {
                        'tag': 'v2026.07.24-repository-mesh-sync-1.0.0',
                        'tagger_name': 'Ingolf Lohmann',
                        'tagger_email': 'ingolf.lohmann@live.com',
                        'tagger_timestamp': '2026-07-24T17:30:00Z',
                        'tag_message': (
                            'QIK-VRT synchronized repository mesh snapshot 1.0.0\n\n'
                            'Common annotated tag for the byte-identical Authority and Mirror '
                            'content tree after dependency-security maintenance, authenticated '
                            'repository-native audio requests, Zenodo inventory refresh, and '
                            'status documentation synchronization. No GitHub Release object and '
                            'no new Zenodo publication are created.'
                        ),
                    }
                    if marker['release'] != fixed_release:
                        fail('release contract changed')
                    projection = copy.deepcopy(marker)
                    supplied = projection.pop('authorization_payload_sha256')
                    calculated = hashlib.sha256(
                        json.dumps(projection, ensure_ascii=False, sort_keys=True, separators=(',', ':')).encode('utf-8')
                    ).hexdigest()
                    if supplied != calculated:
                        fail('authorization payload digest changed')
                    if marker['action'] != 'tag' or marker['confirm'] != 'CREATE_COMMON_ANNOTATED_REPOSITORY_MESH_SYNC_TAG':
                        fail('no exact tag authorization')
                    expected = marker['expected']
                    if set(expected) != {'authority_commit', 'mirror_commit', 'shared_tree'}:
                        fail('expected identity keys changed')
                    if any(not SHA1.fullmatch(value) or value == ZERO40 for value in expected.values()):
                        fail('expected commit or tree identity is absent')

                    repository = os.environ['GITHUB_REPOSITORY']
                    if repository not in REPOSITORIES:
                        fail('repository is outside the two-node contract')
                    source = expected['authority_commit'] if repository == REPOSITORIES[0] else expected['mirror_commit']
                    if os.environ['EVENT_REF'] != 'refs/heads/automation/repository-mesh-sync-tag-20260724':
                        fail('unexpected authorization ref')
                    if os.environ['EVENT_FORCED'] != 'false':
                        fail('forced authorization push')
                    if os.environ['EVENT_AFTER'] != os.environ['GITHUB_SHA']:
                        fail('event after differs from workflow SHA')
                    if os.environ['EVENT_BEFORE'] != source:
                        fail('authorization branch was not created directly from main')
                    parent = subprocess.check_output(['git', 'rev-parse', 'HEAD^'], text=True).strip()
                    if parent != source:
                        fail('marker parent is not the authorized main commit')
                    parents = subprocess.check_output(['git', 'show', '-s', '--format=%P', 'HEAD'], text=True).split()
                    if parents != [source]:
                        fail('authorization commit must have exactly one parent')
                    changed = subprocess.check_output(
                        ['git', 'diff-tree', '--no-commit-id', '--name-only', '-r', 'HEAD^', 'HEAD'],
                        text=True,
                    ).splitlines()
                    if changed != [str(MARKER)]:
                        fail('authorization commit must change only the marker')
                    tree = subprocess.check_output(['git', 'show', '-s', '--format=%T', 'HEAD^'], text=True).strip()
                    if tree != expected['shared_tree']:
                        fail('source parent tree differs from the shared tree')

                    inert = copy.deepcopy(marker)
                    inert['action'] = 'inactive'
                    inert['confirm'] = 'NOT_AUTHORIZED'
                    inert['expected'] = {
                        'authority_commit': ZERO40,
                        'mirror_commit': ZERO40,
                        'shared_tree': ZERO40,
                    }
                    inert_projection = copy.deepcopy(inert)
                    inert_projection.pop('authorization_payload_sha256')
                    inert['authorization_payload_sha256'] = hashlib.sha256(
                        json.dumps(inert_projection, ensure_ascii=False, sort_keys=True, separators=(',', ':')).encode('utf-8')
                    ).hexdigest()
                    parent_marker = json.loads(subprocess.check_output(['git', 'show', f'HEAD^:{MARKER}']))
                    if parent_marker != inert:
                        fail('source parent does not contain the exact inert marker')

                    def api(target: str, method: str, path: str, body=None, missing: bool = False):
                        headers = {
                            'Accept': 'application/vnd.github+json',
                            'X-GitHub-Api-Version': '2022-11-28',
                            'User-Agent': 'qikvrt-repository-mesh-sync-tagger',
                        }
                        if target == repository:
                            headers['Authorization'] = 'Bearer ' + os.environ['GH_API_TOKEN']
                            headers['Content-Type'] = 'application/json'
                        data = None if body is None else json.dumps(body, separators=(',', ':')).encode('utf-8')
                        request = urllib.request.Request(
                            f'https://api.github.com/repos/{target}{path}',
                            data=data,
                            method=method,
                            headers=headers,
                        )
                        try:
                            with urllib.request.urlopen(request, timeout=30) as response:
                                return json.load(response)
                        except urllib.error.HTTPError as error:
                            if missing and error.code == 404:
                                return None
                            raise

                    for target, commit in zip(REPOSITORIES, (expected['authority_commit'], expected['mirror_commit'])):
                        main = api(target, 'GET', '/git/ref/heads/main')['object']['sha']
                        if main != commit:
                            fail(f'{target} main differs from authorization')
                        remote = api(target, 'GET', '/git/commits/' + commit)
                        if remote.get('tree', {}).get('sha') != expected['shared_tree']:
                            fail(f'{target} tree differs from shared tree')

                    branch_name = urllib.parse.quote('automation/repository-mesh-sync-tag-20260724', safe='')
                    remote_authorization = api(repository, 'GET', '/git/ref/heads/' + branch_name)['object']['sha']
                    if remote_authorization != os.environ['GITHUB_SHA']:
                        fail('authorization branch advanced during validation')

                    source_root = Path(os.environ['RUNNER_TEMP']) / 'qikvrt-repository-mesh-source'
                    subprocess.run(['git', 'worktree', 'add', '--detach', str(source_root), source], check=True)
                    subprocess.run(['python3', '-B', 'tools/qikvrt_integrity.py', 'verify'], cwd=source_root, check=True)
                    readme = (source_root / 'README.md').read_text(encoding='utf-8')
                    status = (source_root / 'STATUS.md').read_text(encoding='utf-8')
                    for needle in (
                        fixed_release['tag'],
                        '10.5281/zenodo.21500322',
                        '10.5281/zenodo.21515074',
                        '10.5281/zenodo.21529081',
                    ):
                        if needle not in readme or needle not in status:
                            fail(f'current documentation lacks required identity: {needle}')

                    tag = fixed_release['tag']
                    encoded_tag = urllib.parse.quote(tag, safe='')
                    ref = api(repository, 'GET', '/git/ref/tags/' + encoded_tag, missing=True)
                    if ref is None:
                        tag_object = api(repository, 'POST', '/git/tags', {
                            'tag': tag,
                            'message': fixed_release['tag_message'],
                            'object': source,
                            'type': 'commit',
                            'tagger': {
                                'name': fixed_release['tagger_name'],
                                'email': fixed_release['tagger_email'],
                                'date': fixed_release['tagger_timestamp'],
                            },
                        })
                        api(repository, 'POST', '/git/refs', {
                            'ref': 'refs/tags/' + tag,
                            'sha': tag_object['sha'],
                        })
                        ref = api(repository, 'GET', '/git/ref/tags/' + encoded_tag)
                    if ref.get('object', {}).get('type') != 'tag':
                        fail('common tag is not annotated')
                    obj = api(repository, 'GET', '/git/tags/' + ref['object']['sha'])
                    tagger = obj.get('tagger', {})
                    target = obj.get('object', {})
                    if (
                        obj.get('tag') != tag
                        or obj.get('message') != fixed_release['tag_message']
                        or target.get('type') != 'commit'
                        or target.get('sha') != source
                        or tagger.get('name') != fixed_release['tagger_name']
                        or tagger.get('email') != fixed_release['tagger_email']
                        or tagger.get('date') != fixed_release['tagger_timestamp']
                    ):
                        fail('annotated tag differs from the fixed contract')
                    print(json.dumps({
                        'repository': repository,
                        'tag': tag,
                        'source_commit': source,
                        'shared_tree': expected['shared_tree'],
                        'state': 'TAGGED_AND_VERIFIED',
                    }, sort_keys=True))
                    PYTAG
          '''
          expression_open = chr(36) + '{{'
          final_workflow = final_workflow_template.replace('__OPEN__', expression_open)
          final_workflow = final_workflow.replace('__REPOSITORY__', expression_open + ' github.repository }}')
          workflow_path = Path('.github/workflows/qikvrt_repository_mesh_sync_tag.yml')
          workflow_path.write_text(final_workflow, encoding='utf-8', newline='\n')

          request_path.unlink()
          Path('.github/workflows/qikvrt_repository_mesh_sync_materialize.yml').unlink()
          PY

      - name: Regenerate and verify repository integrity
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/qikvrt_integrity.py generate
          python3 -B tools/qikvrt_integrity.py verify
          git diff --check

      - name: Run the complete repository gate
        shell: bash
        run: |
          set -euo pipefail
          make test
          python3 -B tools/qikvrt_integrity.py verify

      - name: Persist the exact reviewed candidate on the materialization branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'BLOCK: no final repository-mesh candidate was materialized' >&2
            exit 1
          fi
          git commit -m 'Prepare synchronized repository mesh snapshot'
          git push origin HEAD:automation/repository-mesh-sync-materialize-20260724
