name: QIKVRT integrity refresh artifact

on:
  pull_request:
    paths:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Generate deterministic integrity outputs
        run: python3 tools/qikvrt_integrity.py generate
      - name: Verify generated outputs
        run: python3 tools/qikvrt_integrity.py verify
      - name: Commit refreshed integrity outputs when required
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: |
          if git diff --quiet -- REPOSITORY_FILE_MANIFEST.json REPOSITORY_FILE_MANIFEST.json.sha256 SHA256SUMS.txt; then
            echo 'Integrity outputs already current.'
            exit 0
          fi
          git config user.name 'qikvrt-integrity-bot'
          git config user.email 'qikvrt-integrity-bot@users.noreply.github.com'
          git add REPOSITORY_FILE_MANIFEST.json REPOSITORY_FILE_MANIFEST.json.sha256 SHA256SUMS.txt
          git commit -m 'integrity: refresh repository content manifest'
          git push origin "HEAD:${TARGET_BRANCH}"
      - name: Upload integrity outputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: qikvrt-integrity-refresh
          path: |
            REPOSITORY_FILE_MANIFEST.json
            REPOSITORY_FILE_MANIFEST.json.sha256
            SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 7
