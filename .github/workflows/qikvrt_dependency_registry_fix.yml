# Temporary one-shot executor; final cleanup trigger, removes itself before committing.
name: QIKVRT dependency registry authority fix

on:
  push:
    branches:
      - maintenance/dependency-security-updates-final-20260724
    paths:
      - .github/workflows/qikvrt_dependency_registry_fix.yml

permissions:
  contents: write

concurrency:
  group: qikvrt-dependency-registry-authority-fix
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: maintenance/dependency-security-updates-final-20260724
          fetch-depth: 0
      - name: Synchronize registry and rendered coverage authority
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('runtime/toolchains/CACHE_REGISTRY.json')
          value = json.loads(path.read_text(encoding='utf-8'))
          targets = {'pypdf': '6.14.2', 'zod': '4.4.3'}
          allowed = {'pypdf': {'6.10.0', '6.14.2'}, 'zod': {'4.1.12', '4.4.3'}}
          for component, version in targets.items():
              current = value['components'][component]['version']
              if current not in allowed[component]:
                  raise SystemExit(f'BLOCK: unexpected {component} registry version {current!r}')
              value['components'][component]['version'] = version
          path.write_text(
              json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
              newline='\n',
          )
          for temporary in (
              Path('.github/workflows/qikvrt_dependency_integrity_diagnostic.yml'),
              Path('.github/workflows/qikvrt_dependency_registry_fix.yml'),
          ):
              if temporary.exists():
                  temporary.unlink()
          PY
          python3 tools/qikvrt_tool_cache.py render
          python3 tools/qikvrt_tool_cache.py verify
      - name: Regenerate integrity and run the complete repository gate
        id: gate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/qikvrt-dependency-registry-fix
          exec > >(tee /tmp/qikvrt-dependency-registry-fix/MAKE_TEST.log) 2>&1
          python3 tools/qikvrt_integrity.py generate
          python3 tools/qikvrt_integrity.py verify
          make test
          status=$?
          python3 tools/qikvrt_integrity.py verify
          verify_status=$?
          printf 'MAKE_TEST_STATUS=%s\nVERIFY_STATUS=%s\n' "$status" "$verify_status"
          if [ "$status" -ne 0 ] || [ "$verify_status" -ne 0 ]; then
            exit 1
          fi
      - name: Upload bounded gate diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-dependency-registry-fix-diagnostics
          path: /tmp/qikvrt-dependency-registry-fix/MAKE_TEST.log
          if-no-files-found: warn
          retention-days: 30
      - name: Enforce complete repository gate
        if: steps.gate.outcome == 'failure'
        run: exit 1
      - name: Persist verified dependency authorities
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: synchronize dependency cache authorities"
          git push origin HEAD:maintenance/dependency-security-updates-final-20260724
