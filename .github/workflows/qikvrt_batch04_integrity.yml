name: QIKVRT batch04 integrity materialization

on:
  push:
    branches:
      - agent/formalization-cache-hmi-batch04
      - agent/ai-runtime-bootloader
  workflow_dispatch:
    inputs:
      target_branch:
        description: Existing authorized branch to materialize
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: qikvrt-batch04-integrity-${{ github.event.inputs.target_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - name: Validate authorized materialization target
        run: |
          set -euo pipefail
          case "$TARGET_BRANCH" in
            agent/formalization-cache-hmi-batch04|agent/ai-runtime-bootloader) ;;
            *) echo "BLOCK: unauthorized materialization target: $TARGET_BRANCH" >&2; exit 2 ;;
          esac
      - name: Regenerate and verify repository integrity
        run: |
          set -euo pipefail
          python3 tools/qikvrt_integrity.py generate
          python3 tools/qikvrt_integrity.py verify
      - name: Commit regenerated integrity outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPOSITORY_FILE_MANIFEST.json REPOSITORY_FILE_MANIFEST.json.sha256 SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo "Integrity outputs already current."
            exit 0
          fi
          git commit -m "fix: regenerate integrity for ${TARGET_BRANCH##*/}"
          git push origin "HEAD:$TARGET_BRANCH"
