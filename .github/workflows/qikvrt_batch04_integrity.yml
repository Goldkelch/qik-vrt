# Generalized deterministic evidence materializer for protected repository states.
name: QIKVRT repository evidence materialization

on:
  push:
    branches:
      - main
      - agent/formalization-cache-hmi-batch04
      - agent/manuscript-formalization-v2-completion
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: qikvrt-repository-evidence-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  materialize:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      # BEGIN ONE-SHOT DEPENDENCY UPDATE
      - name: Apply consolidated dependency updates and finalize workflow
        if: env.TARGET_REF == 'maintenance/dependency-security-updates-20260724'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import pathlib
          import re

          root = pathlib.Path('.').resolve()
          workflows = sorted((root / '.github/workflows').glob('*.y*ml'))
          checkout_old = 'de0fac2e4500dabe0009e67214ff5f5447ce83dd'
          checkout_new = '3d3c42e5aac5ba805825da76410c181273ba90b1'
          cache_old = '0057852bfaa89a56745cba8c7296529d2fc39830'
          cache_new = '55cc8345863c7cc4c66a329aec7e433d2d1c52a9'
          checkout_count = 0
          cache_count = 0
          for path in workflows:
              text = path.read_text(encoding='utf-8')
              lines = []
              changed = False
              for line in text.splitlines(keepends=True):
                  if f'actions/checkout@{checkout_old}' in line:
                      line = line.replace(
                          f'actions/checkout@{checkout_old}',
                          f'actions/checkout@{checkout_new}',
                      )
                      line = re.sub(r'# v6\.0\.[0-9]+', '# v7.0.1', line)
                      checkout_count += 1
                      changed = True
                  if f'actions/cache/restore@{cache_old}' in line:
                      line = line.replace(
                          f'actions/cache/restore@{cache_old}',
                          f'actions/cache/restore@{cache_new}',
                      )
                      line = line.replace('# v4.3.0', '# v6.1.0')
                      cache_count += 1
                      changed = True
                  lines.append(line)
              if changed:
                  path.write_text(''.join(lines), encoding='utf-8', newline='\n')
          if checkout_count < 12:
              raise SystemExit(f'BLOCK: expected at least 12 checkout pins, changed {checkout_count}')
          if cache_count != 2:
              raise SystemExit(f'BLOCK: expected exactly 2 cache restore pins, changed {cache_count}')

          requirements = root / 'runtime/toolchains/requirements-xml2rfc-3.34.0.txt'
          text = requirements.read_text(encoding='utf-8')
          old = (
              'pypdf==6.10.0 \\\n'
              '    --hash=sha256:90005e959e1596c6e6c84c8b0ad383285b3e17011751cedd17f2ce8fcdfc86de\n'
          )
          new = (
              'pypdf==6.14.2 \\\n'
              '    --hash=sha256:3f07891af76dc002657e04993ab9b4de81de29f9013b9761d0b7968bff12e946 \\\n'
              '    --hash=sha256:7873f502fe4385e79539b21d872392dc0c4e3714327c15881cbc7fbfd1f95b25\n'
          )
          if text.count(old) != 1:
              raise SystemExit('BLOCK: pypdf 6.10.0 lock is absent or ambiguous')
          requirements.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          package = root / 'formalization/QIKVRT_Formalization_v1.0/package.json'
          value = json.loads(package.read_text(encoding='utf-8'))
          if value.get('dependencies', {}).get('zod') != '4.1.12':
              raise SystemExit('BLOCK: package.json Zod source version differs')
          value['dependencies']['zod'] = '4.4.3'
          package.write_text(
              json.dumps(value, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
              newline='\n',
          )

          lock = root / 'formalization/QIKVRT_Formalization_v1.0/package-lock.json'
          value = json.loads(lock.read_text(encoding='utf-8'))
          root_package = value.get('packages', {}).get('', {})
          zod_package = value.get('packages', {}).get('node_modules/zod', {})
          if root_package.get('dependencies', {}).get('zod') != '4.1.12':
              raise SystemExit('BLOCK: package-lock root Zod source version differs')
          if zod_package.get('version') != '4.1.12':
              raise SystemExit('BLOCK: package-lock Zod package source version differs')
          root_package['dependencies']['zod'] = '4.4.3'
          zod_package['version'] = '4.4.3'
          zod_package['resolved'] = 'https://registry.npmjs.org/zod/-/zod-4.4.3.tgz'
          zod_package['integrity'] = 'sha512-ytENFjIJFl2UwYglde2jchW2Hwm4GJFLDiSXWdTrJQBIN9Fcyp7n4DhxJEiWNAJMV1/BqWfW/kkg71UDcHJyTQ=='
          lock.write_text(
              json.dumps(value, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
              newline='\n',
          )

          workflow = root / '.github/workflows/qikvrt_batch04_integrity.yml'
          lines = workflow.read_text(encoding='utf-8').splitlines(keepends=True)
          begin = next(i for i, line in enumerate(lines) if line.strip() == '# BEGIN ONE-SHOT DEPENDENCY UPDATE')
          end = next(i for i, line in enumerate(lines) if line.strip() == '# END ONE-SHOT DEPENDENCY UPDATE')
          if end <= begin:
              raise SystemExit('BLOCK: one-shot workflow markers are malformed')
          del lines[begin:end + 1]
          finalized = ''.join(lines).replace('  pull-requests: write\n', '')
          workflow.write_text(finalized, encoding='utf-8', newline='\n')
          print(f'PASS checkout_pins={checkout_count} cache_restore_pins={cache_count}')
          PY
      # END ONE-SHOT DEPENDENCY UPDATE
      - name: Materialize completed manuscript evidence when present
        shell: bash
        run: |
          set -euo pipefail
          root="formalization/QIKVRT_Formalization_v2.0"
          if [ ! -f "$root/scripts/materialize_completion.py" ]; then
            echo "Completion materializer is not present on this branch."
            exit 0
          fi
          (
            cd "$root"
            python3 scripts/materialize_completion.py
            python3 scripts/render_completion_proof_map.py
            python3 scripts/render_completion_verification_report.py
            python3 scripts/materialize_completion_proof_manifest.py
            python3 scripts/materialize_completion.py --check
            python3 scripts/render_completion_proof_map.py --check
            python3 scripts/render_completion_verification_report.py --check
            python3 scripts/materialize_completion_proof_manifest.py --check
            python3 scripts/validate_completion_claim_graph.py
          )
      - name: Rebuild deterministic formalization release bundle when present
        shell: bash
        run: |
          set -euo pipefail
          script="formalization/QIKVRT_Formalization_v2.0/scripts/package_release.py"
          manifest="release/formalization-v2-alpha2-zenodo.json"
          archive="release/formalization-v2/QIKVRT_Formalization_v2.0-alpha.2.zip"
          sums="release/formalization-v2/ZENODO_SHA256SUMS-alpha.2"
          if [ ! -f "$script" ] || [ ! -f "$manifest" ]; then
            echo "Formalization release bundle is not present on this branch."
            exit 0
          fi
          python3 "$script" \
            --repository-root . \
            --output "$archive" \
            --zenodo-checksums "$sums"
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import pathlib
          import re

          root = pathlib.Path('.').resolve()
          manifest_path = root / 'release/formalization-v2-alpha2-zenodo.json'
          value = json.loads(manifest_path.read_text(encoding='utf-8'))
          files = value['software']['files']
          archive_digest = None
          for entry in files:
              path = root / entry['path']
              raw = path.read_bytes()
              entry['size'] = len(raw)
              entry['md5'] = hashlib.md5(raw, usedforsecurity=False).hexdigest()
              entry['sha256'] = hashlib.sha256(raw).hexdigest()
              if entry['name'] == 'QIKVRT_Formalization_v2.0-alpha.2.zip':
                  archive_digest = entry['sha256']
          if archive_digest is None:
              raise SystemExit('BLOCK: archive entry is absent from the Zenodo manifest')
          notes = value['software']['metadata']['notes']
          notes, count = re.subn(
              r'Autorisiertes Archiv SHA-256: [0-9a-f]{64}\.',
              f'Autorisiertes Archiv SHA-256: {archive_digest}.',
              notes,
              count=1,
          )
          if count != 1:
              raise SystemExit('BLOCK: archive digest note is absent or ambiguous')
          value['software']['metadata']['notes'] = notes
          manifest_path.write_text(
              json.dumps(value, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
              newline='\n',
          )
          PY
          python3 -B tests/test_formalization_v2_release_workflow.py
      - name: Regenerate and verify repository integrity
        run: |
          set -euo pipefail
          python3 tools/qikvrt_integrity.py generate
          python3 tools/qikvrt_integrity.py verify
      - name: Run repository gates before persistence
        shell: bash
        run: |
          set -euo pipefail
          make test
          python3 tools/qikvrt_integrity.py verify
      - name: Commit materialized maintenance candidate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows \
            formalization/QIKVRT_Formalization_v1.0/package.json \
            formalization/QIKVRT_Formalization_v1.0/package-lock.json \
            runtime/toolchains/requirements-xml2rfc-3.34.0.txt \
            formalization/QIKVRT_Formalization_v2.0/claims/TEX_ENVIRONMENTS.json \
            formalization/QIKVRT_Formalization_v2.0/claims/APPENDIX_MATRIX.json \
            formalization/QIKVRT_Formalization_v2.0/claims/CLAIM_GRAPH.json \
            formalization/QIKVRT_Formalization_v2.0/MANUSCRIPT_PROOF_MAP.md \
            formalization/QIKVRT_Formalization_v2.0/VERIFICATION_REPORT.md \
            formalization/QIKVRT_Formalization_v2.0/proofs/PROOF_OBJECT_MANIFEST.json \
            release/formalization-v2/QIKVRT_Formalization_v2.0-alpha.2.zip \
            release/formalization-v2/QIKVRT_Formalization_v2.0-alpha.2.zip.sha256 \
            release/formalization-v2/ZENODO_SHA256SUMS-alpha.2 \
            release/formalization-v2-alpha2-zenodo.json \
            REPOSITORY_FILE_MANIFEST.json \
            REPOSITORY_FILE_MANIFEST.json.sha256 \
            SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo "Repository evidence and dependencies are already current."
            exit 0
          fi
          git commit -m "chore: consolidate dependency security updates"
          candidate="$(git rev-parse HEAD)"
          tree="$(git show -s --format=%T HEAD)"
          set +e
          push_output="$(git push origin "HEAD:$TARGET_REF" 2>&1)"
          push_status=$?
          set -e
          if [ -n "${PR_NUMBER:-}" ]; then
            concise="$(printf '%s\n' "$push_output" | tail -n 20)"
            body="## Consolidated dependency maintenance candidate

            - Candidate commit: \`$candidate\`
            - Candidate tree: \`$tree\`
            - Target branch: \`$TARGET_REF\`
            - Direct push status: \`$push_status\`

            Included updates:
            - actions/checkout 7.0.1
            - actions/cache/restore 6.1.0
            - pypdf 6.14.2
            - Zod 4.4.3

            The full repository test, deterministic evidence regeneration and integrity verification passed before this commit was created.

            \`\`\`text
            $concise
            \`\`\`"
            gh api --method PATCH \
              "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" \
              -f body="$body" >/dev/null
          fi
          exit 0
