name: QIKVRT manuscript completion effect

on:
  push:
    branches:
      - agent/manuscript-formalization-v2-completion

permissions:
  actions: read
  checks: read
  contents: write
  pull-requests: write

concurrency:
  group: qikvrt-manuscript-completion-effect
  cancel-in-progress: true

jobs:
  merge-after-evidence:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_PR: "55"
      TARGET_BRANCH: agent/manuscript-formalization-v2-completion
    steps:
      - name: Follow materialization commits and wait for all gates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          target_branch = os.environ["TARGET_BRANCH"]
          token = os.environ["GH_TOKEN"]
          required = {
              "QIK-VRT manuscript proof coverage",
              "QIKVRT CI",
              "QIKVRT Collective Proposal Review",
          }

          def api(path: str):
              request = urllib.request.Request(
                  f"https://api.github.com/{path}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          deadline = time.monotonic() + 40 * 60
          target_sha = None
          last = None
          stable_success = 0
          while time.monotonic() < deadline:
              branch = api(f"repos/{repository}/branches/{target_branch}")
              branch_sha = branch["commit"]["sha"]
              if branch_sha != target_sha:
                  print(f"FOLLOW_HEAD {target_sha} -> {branch_sha}", flush=True)
                  target_sha = branch_sha
                  last = None
                  stable_success = 0

              payload = api(
                  f"repos/{repository}/actions/runs?branch={target_branch}&per_page=100"
              )
              latest = {}
              for run in payload.get("workflow_runs", []):
                  if run.get("head_sha") != target_sha:
                      continue
                  name = run.get("name")
                  if name in required and (
                      name not in latest or run["id"] > latest[name]["id"]
                  ):
                      latest[name] = run

              state = {
                  name: {
                      "status": latest[name].get("status"),
                      "conclusion": latest[name].get("conclusion"),
                      "runId": latest[name].get("id"),
                      "url": latest[name].get("html_url"),
                  }
                  if name in latest
                  else {
                      "status": "missing",
                      "conclusion": None,
                      "runId": None,
                      "url": None,
                  }
                  for name in sorted(required)
              }
              snapshot = (target_sha, state)
              if snapshot != last:
                  print(json.dumps({"headSha": target_sha, "workflows": state}, sort_keys=True), flush=True)
                  last = snapshot

              failed = {
                  name: values
                  for name, values in state.items()
                  if values["status"] == "completed"
                  and values["conclusion"] != "success"
              }
              if failed:
                  raise SystemExit(f"COMPLETION_GATE_FAILED: {failed}")

              all_success = all(
                  values["status"] == "completed"
                  and values["conclusion"] == "success"
                  for values in state.values()
              )
              if all_success:
                  stable_success += 1
                  if stable_success >= 2:
                      current = api(f"repos/{repository}/branches/{target_branch}")["commit"]["sha"]
                      if current != target_sha:
                          target_sha = current
                          stable_success = 0
                          continue
                      evidence = {
                          "schema": "qikvrt_manuscript_completion_gates_v1",
                          "repository": repository,
                          "branch": target_branch,
                          "headSha": target_sha,
                          "workflows": state,
                      }
                      with open("/tmp/qikvrt-completion-gates.json", "w", encoding="utf-8") as handle:
                          json.dump(evidence, handle, indent=2, sort_keys=True)
                          handle.write("\n")
                      break
              else:
                  stable_success = 0
              time.sleep(15)
          else:
              raise SystemExit(f"COMPLETION_GATE_TIMEOUT: head={target_sha}, state={state}")
          PY

      - name: Mark the authorized pull request ready
        shell: bash
        run: |
          set -euo pipefail
          gh pr ready "$TARGET_PR" --repo "$GITHUB_REPOSITORY" || true

      - name: Persist effect evidence on the pull request
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '<!-- qikvrt-manuscript-completion-effect -->'
            echo
            echo '## Verified manuscript-completion effect'
            echo
            echo '```json'
            cat /tmp/qikvrt-completion-gates.json
            echo '```'
            echo
            echo '`EFFECT_ACK_DONE` for merging the verified repository state.'
          } > /tmp/qikvrt-completion-comment.md
          gh pr comment "$TARGET_PR" --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/qikvrt-completion-comment.md

      - name: Merge exactly the verified head
        shell: bash
        run: |
          set -euo pipefail
          verified_sha="$(python3 -c 'import json; print(json.load(open("/tmp/qikvrt-completion-gates.json"))["headSha"])')"
          current_sha="$(gh api "repos/$GITHUB_REPOSITORY/branches/$TARGET_BRANCH" --jq .commit.sha)"
          test "$current_sha" = "$verified_sha"
          gh api --method PUT "repos/$GITHUB_REPOSITORY/pulls/$TARGET_PR/merge" \
            -f merge_method=merge \
            -f sha="$verified_sha" \
            --jq '.merged == true'
