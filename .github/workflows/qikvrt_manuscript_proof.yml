name: QIK-VRT manuscript proof coverage

on:
  push:
    paths:
      - "formalization/QIKVRT_Formalization_v2.0/**"
      - "runtime/toolchains/**"
      - "tools/qikvrt_runtime_cache.py"
      - "tests/test_runtime_cache_manifest.py"
      - ".github/workflows/qikvrt_manuscript_proof.yml"
      - "docs/HUMAN_MACHINE_PROGRESS_STANDARD.md"
      - "schemas/human_machine_progress.schema.json"
  pull_request:
    paths:
      - "formalization/QIKVRT_Formalization_v2.0/**"
      - "runtime/toolchains/**"
      - "tools/qikvrt_runtime_cache.py"
      - "tests/test_runtime_cache_manifest.py"
      - ".github/workflows/qikvrt_manuscript_proof.yml"
      - "docs/HUMAN_MACHINE_PROGRESS_STANDARD.md"
      - "schemas/human_machine_progress.schema.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qikvrt-manuscript-proof-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-claim-and-kernel-gates:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: formalization/QIKVRT_Formalization_v2.0
    steps:
      - name: Check out reviewed proof bytes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bind exact Python and pip cache
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
          architecture: x64
          cache: pip
          cache-dependency-path: runtime/toolchains/requirements-xml2rfc-3.34.0.txt

      - name: Validate complete repository runtime cache contract
        working-directory: .
        run: python3 tools/qikvrt_runtime_cache.py verify

      - name: Restore exact source-bound Lean runtime cache
        id: lean-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.elan
            formalization/QIKVRT_Formalization_v2.0/.lake/packages
            formalization/QIKVRT_Formalization_v2.0/.lake/build
          key: qikvrt-lean-v4-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('formalization/QIKVRT_Formalization_v2.0/lean-toolchain', 'formalization/QIKVRT_Formalization_v2.0/lakefile.toml', 'formalization/QIKVRT_Formalization_v2.0/lake-manifest.json', 'formalization/QIKVRT_Formalization_v2.0/**/*.lean', 'runtime/toolchains/CACHE_MANIFEST.json') }}
          enableCrossOsArchive: false

      - name: Install or verify exact Lean kernel
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: formalization/QIKVRT_Formalization_v2.0
          test: false

      - name: Verify exact runtime versions
        run: |
          set -euo pipefail
          python --version | grep '3\.12\.13'
          lean --version | grep 'version 4\.19\.0'
          lake --version

      - name: Verify locked manuscript bytes and page count
        run: python3 scripts/verify_source_lock.py
      - name: Verify generated source inventory is current
        run: python3 scripts/extract_tex_inventory.py --check
      - name: Verify human proof map is current
        run: python3 scripts/render_proof_map.py --check
      - name: Validate claim graph and epistemic boundaries
        run: python3 scripts/validate_claim_graph.py
      - name: Run positive and negative provenance tests
        run: python3 -m unittest discover -s tests -v
      - name: Compile exact statement and proof bindings
        run: lake build
      - name: Audit theorem axiom dependencies
        run: python3 scripts/audit_lean_axioms.py
      - name: Reject project proof escapes
        run: python3 scripts/audit_proof_escapes.py
      - name: Verify persistent proof-object manifest
        run: python3 scripts/verify_proof_object_manifest.py

      - name: Emit cumulative proof-runtime receipt
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          CACHE_HIT: ${{ steps.lean-cache.outputs.cache-hit }}
        run: |
          mkdir -p ../../.qikvrt/evidence
          python3 - <<'PY'
          import json, os, subprocess, time
          from pathlib import Path

          def first(*cmd):
              return subprocess.check_output(cmd, text=True, stderr=subprocess.STDOUT).splitlines()[0]

          target = Path('../../.qikvrt/evidence/runtime_cache_latest.json')
          target.write_text(json.dumps({
              'schema': 'qikvrt_runtime_cache_evidence_v2',
              'status': 'PASS' if os.environ.get('JOB_STATUS') == 'success' else 'BLOCK',
              'cache_hit': os.environ.get('CACHE_HIT', ''),
              'repository': os.environ.get('GITHUB_REPOSITORY', ''),
              'ref_name': os.environ.get('GITHUB_REF_NAME', ''),
              'run_id': os.environ.get('GITHUB_RUN_ID', ''),
              'run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT', ''),
              'source_sha': os.environ.get('GITHUB_SHA', ''),
              'python': first('python', '--version'),
              'lean': first('lean', '--version'),
              'lake': first('lake', '--version'),
              'recorded_unix': int(time.time()),
          }, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY

      - name: Save exact verified Lean runtime cache
        if: >-
          success() &&
          steps.lean-cache.outputs.cache-hit != 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.elan
            formalization/QIKVRT_Formalization_v2.0/.lake/packages
            formalization/QIKVRT_Formalization_v2.0/.lake/build
          key: qikvrt-lean-v4-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('formalization/QIKVRT_Formalization_v2.0/lean-toolchain', 'formalization/QIKVRT_Formalization_v2.0/lakefile.toml', 'formalization/QIKVRT_Formalization_v2.0/lake-manifest.json', 'formalization/QIKVRT_Formalization_v2.0/**/*.lean', 'runtime/toolchains/CACHE_MANIFEST.json') }}
          enableCrossOsArchive: false

      - name: Upload proof-runtime audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-manuscript-proof-runtime
          retention-days: 30
          if-no-files-found: error
          path: .qikvrt/evidence/runtime_cache_latest.json
