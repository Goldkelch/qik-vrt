name: Recover and complete formalization v2.0.0 publication

"on":
  push:
    branches:
      - bootstrap/formalization-v2-completion-zenodo-recovery-20260724
  workflow_dispatch: {}

permissions:
  actions: write
  checks: read
  contents: write
  pull-requests: write

concurrency:
  group: qikvrt-formalization-v2-completion-publication-lifecycle
  cancel-in-progress: true

jobs:
  recover:
    runs-on: ubuntu-24.04
    timeout-minutes: 100
    env:
      GH_TOKEN: ${{ secrets.QIKVRT_GITHUB_TOKEN != '' && secrets.QIKVRT_GITHUB_TOKEN || github.token }}
      RESERVE_BRANCH: automation/formalization-v2-completion-zenodo-reserve-20260724
      FINALIZE_BRANCH: automation/formalization-v2-completion-zenodo-finalize-20260724
      STATE_PATH: release/formalization-v2-completion-zenodo.json
    steps:
      - name: Check out authority repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Recover and complete lifecycle
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch_exists() {
            gh api "repos/${GITHUB_REPOSITORY}/branches/$1" >/dev/null 2>&1
          }

          file_exists() {
            branch="$1"
            path="$2"
            gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${branch}" >/dev/null 2>&1
          }

          dispatch_new_run() {
            workflow="$1"
            branch="$2"
            before="$(gh run list \
              --workflow "$workflow" \
              --branch "$branch" \
              --event workflow_dispatch \
              --limit 30 \
              --json databaseId | jq '[.[].databaseId]')"
            gh workflow run "$workflow" --ref "$branch"
            run_id=""
            for _ in $(seq 1 90); do
              run_id="$(gh run list \
                --workflow "$workflow" \
                --branch "$branch" \
                --event workflow_dispatch \
                --limit 30 \
                --json databaseId,status,conclusion,createdAt \
                | jq -r --argjson before "$before" \
                  '[.[] | select(.databaseId as $id | ($before | index($id) | not))] | sort_by(.createdAt) | reverse | .[0].databaseId // empty')"
              if [ -n "$run_id" ]; then break; fi
              sleep 4
            done
            test -n "$run_id"
            gh run watch "$run_id" --exit-status
          }

          wait_for_open_pr() {
            branch="$1"
            for _ in $(seq 1 180); do
              number="$(gh pr list \
                --head "$branch" \
                --base main \
                --state open \
                --limit 10 \
                --json number \
                --jq '.[0].number // empty')"
              if [ -n "$number" ]; then
                printf '%s\n' "$number"
                return 0
              fi
              sleep 10
            done
            return 1
          }

          run_checks() {
            branch="$1"
            dispatch_new_run qikvrt_ci.yml "$branch"
            dispatch_new_run qikvrt_manuscript_proof.yml "$branch"
            dispatch_new_run qikvrt_collective_review.yml "$branch"
          }

          merge_pr() {
            number="$1"
            if gh pr view "$number" --json mergedAt --jq -e '.mergedAt != null' >/dev/null; then
              return 0
            fi
            if ! gh pr merge "$number" --merge --delete-branch=false; then
              gh pr merge "$number" --merge --admin --delete-branch=false
            fi
            for _ in $(seq 1 90); do
              if gh pr view "$number" --json mergedAt --jq -e '.mergedAt != null' >/dev/null; then
                return 0
              fi
              sleep 5
            done
            return 1
          }

          state_on_main() {
            file_exists main "$STATE_PATH"
          }

          branch_exists "$RESERVE_BRANCH"

          # Reserve/upload is idempotently resumed only when no persisted state exists.
          if ! file_exists "$RESERVE_BRANCH" "$STATE_PATH"; then
            dispatch_new_run qikvrt_repository_materialize.yml "$RESERVE_BRANCH"
            dispatch_new_run qikvrt_formalization_v2_zenodo.yml "$RESERVE_BRANCH"
          fi

          if ! state_on_main; then
            dispatch_new_run qikvrt_repository_materialize.yml "$RESERVE_BRANCH"
            reserve_pr="$(wait_for_open_pr "$RESERVE_BRANCH")"
            run_checks "$RESERVE_BRANCH"
            merge_pr "$reserve_pr"
          fi
          state_on_main

          git fetch --no-tags origin main
          git checkout -B "$FINALIZE_BRANCH" origin/main
          git push --force-with-lease origin "HEAD:refs/heads/${FINALIZE_BRANCH}"

          # Finalization is safe to repeat: the helper verifies already-published state.
          dispatch_new_run qikvrt_formalization_v2_zenodo_finalize.yml "$FINALIZE_BRANCH"
          dispatch_new_run qikvrt_repository_materialize.yml "$FINALIZE_BRANCH"
          finalize_pr="$(wait_for_open_pr "$FINALIZE_BRANCH")"
          run_checks "$FINALIZE_BRANCH"
          merge_pr "$finalize_pr"

          gh api "repos/${GITHUB_REPOSITORY}/contents/${STATE_PATH}?ref=main" \
            --jq '.content' | tr -d '\n' | base64 -d > /tmp/zenodo-state.json

          python3 - <<'PY'
          from __future__ import annotations
          import json
          import urllib.request

          state = json.load(open('/tmp/zenodo-state.json', encoding='utf-8'))
          record_id = (
              state.get('record_id')
              or state.get('recordId')
              or state.get('record')
              or state.get('deposition_id')
              or state.get('depositionId')
          )
          if not record_id:
              raise SystemExit('BLOCK: Zenodo state has no record id')
          with urllib.request.urlopen(
              f'https://zenodo.org/api/records/{record_id}', timeout=60
          ) as response:
              record = json.load(response)
          version = record.get('metadata', {}).get('version')
          doi = record.get('doi') or record.get('metadata', {}).get('doi')
          if version != '2.0.0':
              raise SystemExit(f'BLOCK: public Zenodo version {version!r}')
          if not doi:
              raise SystemExit('BLOCK: public Zenodo DOI absent')
          print(json.dumps({
              'status': 'PASS',
              'record_id': str(record_id),
              'doi': doi,
              'version': version,
              'file_count': len(record.get('files', [])),
          }, sort_keys=True))
          PY
