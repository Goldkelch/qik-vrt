# Temporary two-lock render comparison; remove after the exact HTML authority is fixed.
name: QIKVRT adaptive runtime Ubuntu diagnostic

on:
  push:
    branches:
      - maintenance/dependency-security-updates-final-20260724
    paths:
      - .github/workflows/qikvrt_adaptive_runtime_ubuntu_diagnostic.yml

permissions:
  contents: read

concurrency:
  group: qikvrt-adaptive-runtime-ubuntu-diagnostic
  cancel-in-progress: false

jobs:
  compare-renders:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: maintenance/dependency-security-updates-final-20260724
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12.13"
          architecture: x64
      - name: Reproduce published and security-refresh renders byte-for-byte
        shell: bash
        env:
          PUBLISHED_COMMIT: b872a1bd3a5b86532280adf7557cbf989f8ff5a5
          EXPECTED_PUBLISHED_HTML_SHA256: 974f977d9ea50cfaf4f8d2beea6bb854b3dd7b94ef16b3473bed202aeb67e151
          EXPECTED_PUBLISHED_HTML_SIZE: "103849"
        run: |
          output=/tmp/qikvrt-adaptive-runtime-ubuntu
          mkdir -p "$output"
          exec > >(tee "$output/TRACE.log") 2>&1
          set -euxo pipefail
          python="$pythonLocation/bin/python"
          source="docs/publications/2026-07-22-effect-ack-universal-effect-control/inputs/draft-lohmann-qikvrt-effect-ack-01.xml"
          old_lock="$output/requirements-published.txt"
          new_lock="runtime/toolchains/requirements-xml2rfc-3.34.0.txt"
          git show "$PUBLISHED_COMMIT:runtime/toolchains/requirements-xml2rfc-3.34.0.txt" > "$old_lock"

          build_renderer() {
            name="$1"
            lock="$2"
            root="$output/$name"
            wheelhouse="$root/wheelhouse"
            venv="$root/venv"
            mkdir -p "$wheelhouse"
            "$python" -I -m pip --isolated --disable-pip-version-check download \
              --index-url https://pypi.org/simple --dest "$wheelhouse" \
              --only-binary=:all: --require-hashes --no-deps -r "$lock"
            "$python" -I -m venv --copies "$venv"
            "$venv/bin/python" -I -m pip --isolated --disable-pip-version-check install \
              --no-index --find-links "$wheelhouse" --only-binary=:all: \
              --require-hashes --no-deps --require-virtualenv -r "$lock"
            "$venv/bin/xml2rfc" --version
          }

          build_renderer published "$old_lock"
          build_renderer refreshed "$new_lock"

          render() {
            name="$1"
            renderer="$output/$name/venv/bin/xml2rfc"
            cache="$output/$name/cache"
            mkdir -p "$cache"
            "$renderer" "$source" --v3 --text --no-network --skip-config-files \
              --warn-bare-unicode --cache "$cache" --verbose \
              --out "$output/$name.txt"
            "$renderer" "$source" --v3 --html --no-network --skip-config-files \
              --warn-bare-unicode --cache "$cache" --verbose \
              --out "$output/$name.html"
          }

          render published
          render refreshed
          sha256sum "$output/published.txt" "$output/refreshed.txt" \
            "$output/published.html" "$output/refreshed.html" | tee "$output/SHA256SUMS"
          wc -c "$output/published.txt" "$output/refreshed.txt" \
            "$output/published.html" "$output/refreshed.html" | tee "$output/SIZES.txt"

          published_sha="$(sha256sum "$output/published.html" | awk '{print $1}')"
          published_size="$(wc -c < "$output/published.html" | tr -d ' ')"
          test "$published_sha" = "$EXPECTED_PUBLISHED_HTML_SHA256"
          test "$published_size" = "$EXPECTED_PUBLISHED_HTML_SIZE"
          cmp "$output/published.txt" "$output/refreshed.txt"

          "$python" -I -S -B - "$output" <<'PY'
          from __future__ import annotations

          import difflib
          import hashlib
          import json
          from pathlib import Path
          import sys

          root = Path(sys.argv[1])
          old = (root / "published.html").read_bytes()
          new = (root / "refreshed.html").read_bytes()
          differing = [i for i, (a, b) in enumerate(zip(old, new)) if a != b]
          summary = {
              "published_sha256": hashlib.sha256(old).hexdigest(),
              "refreshed_sha256": hashlib.sha256(new).hexdigest(),
              "published_size": len(old),
              "refreshed_size": len(new),
              "differing_byte_count": len(differing) + abs(len(old) - len(new)),
              "first_differing_offsets": differing[:100],
          }
          (root / "comparison.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          old_lines = old.decode("utf-8").splitlines(keepends=True)
          new_lines = new.decode("utf-8").splitlines(keepends=True)
          diff = difflib.unified_diff(
              old_lines,
              new_lines,
              fromfile="published-pypdf-6.10.0.html",
              tofile="refreshed-pypdf-6.14.2.html",
          )
          (root / "render.diff").write_text("".join(diff), encoding="utf-8")
          print(json.dumps(summary, sort_keys=True))
          PY

          cp docs/publications/2026-07-22-effect-ack-universal-effect-control/IETF_RENDER_VALIDATION.json \
            "$output/IETF_RENDER_VALIDATION.before.json"
      - name: Upload two-lock render comparison
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-adaptive-runtime-two-lock-render-comparison
          retention-days: 30
          path: |
            /tmp/qikvrt-adaptive-runtime-ubuntu/TRACE.log
            /tmp/qikvrt-adaptive-runtime-ubuntu/SHA256SUMS
            /tmp/qikvrt-adaptive-runtime-ubuntu/SIZES.txt
            /tmp/qikvrt-adaptive-runtime-ubuntu/comparison.json
            /tmp/qikvrt-adaptive-runtime-ubuntu/render.diff
            /tmp/qikvrt-adaptive-runtime-ubuntu/published.html
            /tmp/qikvrt-adaptive-runtime-ubuntu/refreshed.html
            /tmp/qikvrt-adaptive-runtime-ubuntu/IETF_RENDER_VALIDATION.before.json
          if-no-files-found: error
