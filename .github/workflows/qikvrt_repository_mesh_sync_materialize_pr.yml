name: QIK-VRT repository mesh sync materializer PR trigger

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - release/repository-mesh-sync-materialize-request.json
      - .github/workflows/qikvrt_repository_mesh_sync_materialize.yml
      - .github/workflows/qikvrt_repository_mesh_sync_materialize_pr.yml

permissions:
  contents: read

concurrency:
  group: qikvrt-repository-mesh-sync-materializer-pr
  cancel-in-progress: false

jobs:
  materialize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'automation/repository-mesh-sync-materialize-20260724'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out the exact PR head
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Bind materialization to CPython 3.12.13 x64
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12.13'
          architecture: x64

      - name: Execute the fixed embedded materialization program
        shell: bash
        run: |
          set -euo pipefail
          python3 -B - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/qikvrt_repository_mesh_sync_materialize.yml')
          raw = source.read_text(encoding='utf-8')
          start = "          python3 -B - <<'PY'\n"
          end = "\n          PY\n\n      - name: Regenerate and verify repository integrity"
          if raw.count(start) != 1 or raw.count(end) != 1:
              raise SystemExit('BLOCK: embedded materialization program is absent or ambiguous')
          program = textwrap.dedent(raw.split(start, 1)[1].split(end, 1)[0])
          function_anchor = "def replace_once(path: str, old: str, new: str) -> None:\n"
          if program.count(function_anchor) != 1:
              raise SystemExit('BLOCK: replacement helper is absent or ambiguous')
          function_replacement = function_anchor + (
              "    import inspect\n"
              "    def clean(value: str) -> str:\n"
              "        cleaned = inspect.cleandoc(value)\n"
              "        if cleaned.startswith('- '):\n"
              "            cleaned = '\\n'.join(\n"
              "                line if not line or line.startswith('- ') else '  ' + line\n"
              "                for line in cleaned.splitlines()\n"
              "            )\n"
              "        return cleaned + '\\n'\n"
              "    old = clean(old)\n"
              "    new = clean(new)\n"
          )
          program = program.replace(function_anchor, function_replacement, 1)
          error_anchor = "raise SystemExit(f'BLOCK: expected one replacement anchor in {path}, found {count}')"
          error_replacement = "raise SystemExit(f'BLOCK: expected one replacement anchor in {path}: {old.splitlines()[0]!r}, found {count}')"
          if program.count(error_anchor) != 1:
              raise SystemExit('BLOCK: replacement error contract is absent or ambiguous')
          program = program.replace(error_anchor, error_replacement, 1)
          exec(compile(program, str(source) + ':embedded', 'exec'), {'__name__': '__main__'})

          evidence_path = Path('.github/workflows/qikvrt_batch04_integrity.yml')
          evidence_text = evidence_path.read_text(encoding='utf-8')
          temporary_condition = (
              "    if: >-\n"
              "      github.head_ref != 'automation/repository-mesh-sync-materialize-20260724' &&\n"
              "      (github.event_name != 'pull_request' ||\n"
              "       (github.event.pull_request.head.repo.full_name == github.repository &&\n"
              "        github.actor != 'dependabot[bot]'))\n"
          )
          original_condition = (
              "    if: >-\n"
              "      github.event_name != 'pull_request' ||\n"
              "      (github.event.pull_request.head.repo.full_name == github.repository &&\n"
              "       github.actor != 'dependabot[bot]')\n"
          )
          if evidence_text.count(temporary_condition) != 1:
              raise SystemExit('BLOCK: temporary evidence-materializer serialization is absent or ambiguous')
          evidence_path.write_text(
              evidence_text.replace(temporary_condition, original_condition, 1),
              encoding='utf-8',
              newline='\n',
          )

          Path('.github/workflows/qikvrt_repository_mesh_sync_materialize_pr.yml').unlink()
          Path('.github/workflows/qikvrt_repository_mesh_sync_diagnose.yml').unlink(missing_ok=True)
          PY

      - name: Regenerate and verify repository integrity
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/qikvrt_integrity.py generate
          python3 -B tools/qikvrt_integrity.py verify
          git diff --check

      - name: Run the complete repository gate
        shell: bash
        run: |
          set -euo pipefail
          make test
          python3 -B tools/qikvrt_integrity.py verify

      - name: Package the exact reviewed Authority and Mirror deltas
        shell: bash
        env:
          HANDOFF_ROOT: ${{ runner.temp }}/qikvrt-repository-mesh-final
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          final_tree="$(git write-tree)"
          python3 -B - "$HANDOFF_ROOT" "$final_tree" <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import shutil
          import stat
          import subprocess
          import sys
          from pathlib import Path

          root = Path(sys.argv[1])
          final_tree = sys.argv[2]
          payload = root / 'payload'
          payload.mkdir(parents=True, exist_ok=True)

          authority_base = 'ae04e07c72f2e2631d65678305822a6da809000a'
          mirror_equivalent = 'f4d1660be3e602bbe872634b226cadc18bac6fc2'

          def git(*args: str) -> str:
              return subprocess.check_output(['git', *args], text=True).strip()

          def delta(base: str) -> list[dict[str, object]]:
              raw = subprocess.check_output(
                  ['git', 'diff', '--cached', '--name-status', '--no-renames', '-z', base]
              )
              parts = raw.decode('utf-8').split('\0')
              if parts and parts[-1] == '':
                  parts.pop()
              if len(parts) % 2:
                  raise SystemExit('BLOCK: malformed NUL-delimited staged delta')
              rows: list[dict[str, object]] = []
              for index in range(0, len(parts), 2):
                  status_code, path = parts[index], parts[index + 1]
                  if status_code not in {'A', 'M', 'D'}:
                      raise SystemExit(f'BLOCK: unsupported delta status {status_code!r} for {path}')
                  row: dict[str, object] = {
                      'path': path,
                      'action': 'delete' if status_code == 'D' else 'upsert',
                  }
                  if status_code != 'D':
                      source = Path(path)
                      mode_value = source.lstat().st_mode
                      if source.is_symlink() or not stat.S_ISREG(mode_value):
                          raise SystemExit(f'BLOCK: unsafe final candidate path: {path}')
                      stage = subprocess.check_output(
                          ['git', 'ls-files', '--stage', '--', path], text=True
                      ).strip()
                      fields = stage.split(None, 3)
                      if len(fields) < 4 or fields[2] != '0':
                          raise SystemExit(f'BLOCK: unexpected index entry for {path}')
                      mode, blob_sha = fields[0], fields[1]
                      if mode not in {'100644', '100755'}:
                          raise SystemExit(f'BLOCK: unsupported regular-file mode {mode} for {path}')
                      data = source.read_bytes()
                      row.update({
                          'mode': mode,
                          'git_blob_sha': blob_sha,
                          'bytes': len(data),
                          'sha256': hashlib.sha256(data).hexdigest(),
                      })
                      target = payload / path
                      target.parent.mkdir(parents=True, exist_ok=True)
                      if not target.exists():
                          shutil.copyfile(source, target)
                      elif target.read_bytes() != data:
                          raise SystemExit(f'BLOCK: conflicting payload bytes for {path}')
                  rows.append(row)
              return rows

          authority_delta = delta(authority_base)
          mirror_delta = delta(mirror_equivalent)
          required = {
              '.github/workflows/qikvrt_repository_mesh_sync_tag.yml',
              'README.md',
              'STATUS.md',
              'CHANGELOG.md',
              'REPOSITORY_FILE_MANIFEST.json',
              'REPOSITORY_FILE_MANIFEST.json.sha256',
              'SHA256SUMS.txt',
              'policy/qikvrt-repository-mesh-sync-request.schema.json',
              'release/repository-mesh-sync-request.json',
          }
          final_upserts = {row['path'] for row in mirror_delta if row['action'] == 'upsert'}
          missing = sorted(required - final_upserts)
          if missing:
              raise SystemExit('BLOCK: final handoff lacks required paths: ' + ', '.join(missing))
          forbidden = {
              '.github/workflows/qikvrt_repository_mesh_sync_materialize.yml',
              '.github/workflows/qikvrt_repository_mesh_sync_materialize_pr.yml',
              '.github/workflows/qikvrt_repository_mesh_sync_diagnose.yml',
              'release/repository-mesh-sync-materialize-request.json',
          }
          for path in forbidden:
              if subprocess.run(
                  ['git', 'cat-file', '-e', f'{final_tree}:{path}'],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              ).returncode == 0:
                  raise SystemExit(f'BLOCK: temporary path remains in final tree: {path}')

          manifest = {
              'schema': 'qikvrt_repository_mesh_final_handoff_v1',
              'workflow_head': git('rev-parse', 'HEAD'),
              'authority_base_commit': authority_base,
              'authority_base_tree': git('show', '-s', '--format=%T', authority_base),
              'mirror_base_equivalent_commit': mirror_equivalent,
              'mirror_base_tree': git('show', '-s', '--format=%T', mirror_equivalent),
              'expected_final_tree': final_tree,
              'tag': 'v2026.07.24-repository-mesh-sync-1.0.0',
              'authority_delta': authority_delta,
              'mirror_delta': mirror_delta,
          }
          canonical = json.dumps(manifest, ensure_ascii=False, sort_keys=True, separators=(',', ':')).encode('utf-8')
          manifest['canonical_sha256'] = hashlib.sha256(canonical).hexdigest()
          (root / 'FINAL_TREE_HANDOFF.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps({
              'authority_delta_count': len(authority_delta),
              'mirror_delta_count': len(mirror_delta),
              'expected_final_tree': final_tree,
              'canonical_sha256': manifest['canonical_sha256'],
          }, sort_keys=True))
          PY

      - name: Upload the exact reviewed final-tree handoff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repository-mesh-final-candidate-${{ github.sha }}
          path: ${{ runner.temp }}/qikvrt-repository-mesh-final/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
