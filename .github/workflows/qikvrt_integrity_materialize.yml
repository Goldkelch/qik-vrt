name: QIKVRT integrity materialization

on:
  push:
    branches:
      - agent/formalization-v2-batch03-shift
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qikvrt-integrity-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - name: Assert authoritative repository origin
        env:
          EXPECTED_REPOSITORY: Goldkelch/qik-vrt
          ACTUAL_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -eu
          test "$ACTUAL_REPOSITORY" = "$EXPECTED_REPOSITORY" || {
            echo "BLOCK PR_HEAD_ORIGIN_MISMATCH: expected $EXPECTED_REPOSITORY, got $ACTUAL_REPOSITORY" >&2
            exit 2
          }
          if [ "$EVENT_NAME" = "pull_request" ]; then
            test "$PR_HEAD_REPOSITORY" = "$EXPECTED_REPOSITORY" || {
              echo "BLOCK PR_HEAD_REPOSITORY_NOT_AUTHORITATIVE: expected $EXPECTED_REPOSITORY, got $PR_HEAD_REPOSITORY" >&2
              echo "Remediation: create or update the PR from a branch inside $EXPECTED_REPOSITORY." >&2
              exit 2
            }
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      - name: Generate deterministic integrity outputs
        run: python3 tools/qikvrt_integrity.py generate

      - name: Verify generated integrity outputs
        run: python3 tools/qikvrt_integrity.py verify

      - name: Write machine-readable run evidence
        env:
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -eu
          mkdir -p .qikvrt/evidence
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          paths = [
              "REPOSITORY_FILE_MANIFEST.json",
              "REPOSITORY_FILE_MANIFEST.json.sha256",
              "SHA256SUMS.txt",
          ]
          evidence = {
              "schema": "qikvrt_integrity_materialization_evidence_v1",
              "status": "PASS",
              "repository": os.environ["REPOSITORY"],
              "ref_name": os.environ["REF_NAME"],
              "event_name": os.environ["EVENT_NAME"],
              "source_sha": os.environ["SOURCE_SHA"],
              "run_id": int(os.environ["RUN_ID"]),
              "run_attempt": int(os.environ["RUN_ATTEMPT"]),
              "outputs": {},
          }
          for name in paths:
              data = Path(name).read_bytes()
              evidence["outputs"][name] = {
                  "bytes": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              }
          target = Path(".qikvrt/evidence/integrity_materialization_latest.json")
          target.write_text(json.dumps(evidence, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Persist verified outputs and evidence
        if: github.event_name != 'pull_request'
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          set -eu
          git config user.name "qikvrt-integrity-bot"
          git config user.email "qikvrt-integrity-bot@users.noreply.github.com"
          git add -- REPOSITORY_FILE_MANIFEST.json REPOSITORY_FILE_MANIFEST.json.sha256 SHA256SUMS.txt .qikvrt/evidence/integrity_materialization_latest.json
          if git diff --cached --quiet; then
            echo "No integrity delta to persist."
          else
            git commit -m "ci: persist verified integrity materialization [skip ci]"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

      - name: Upload generated integrity outputs and evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: qikvrt-integrity-materialized
          retention-days: 7
          if-no-files-found: error
          path: |
            REPOSITORY_FILE_MANIFEST.json
            REPOSITORY_FILE_MANIFEST.json.sha256
            SHA256SUMS.txt
            .qikvrt/evidence/integrity_materialization_latest.json
