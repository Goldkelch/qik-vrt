name: QIKVRT integrity materialization

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Generate deterministic integrity outputs
        run: python3 tools/qikvrt_integrity.py generate
      - name: Verify generated integrity outputs
        run: python3 tools/qikvrt_integrity.py verify
      - name: Upload generated integrity outputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: qikvrt-integrity-materialized
          retention-days: 7
          if-no-files-found: error
          path: |
            REPOSITORY_FILE_MANIFEST.json
            REPOSITORY_FILE_MANIFEST.json.sha256
            SHA256SUMS.txt
