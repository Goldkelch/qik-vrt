name: QIK-VRT formalization v2 alpha.2 public record verification

"on":
  push:
    branches:
      - automation/formalization-v2-alpha2-draft-inventory-20260724
    paths:
      - release/formalization-v2-alpha2-public-verify-request.json

permissions:
  contents: read

jobs:
  verify-public-record:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact verification request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Compare public record, metadata and every common file byte
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .qikvrt/release/formalization-v2-alpha2
          python -I -S -B - <<'PY'
          import hashlib
          import json
          import traceback
          import urllib.parse
          import urllib.request
          from pathlib import Path

          output = Path('.qikvrt/release/formalization-v2-alpha2/public-verification.json')
          result = {
              'schema': 'qikvrt_formalization_v2_alpha2_public_verification_v1',
              'status': 'ERROR',
              'record_id': 21518464,
              'concept_record_id': 21488115,
              'doi': '10.5281/zenodo.21518464',
              'version': '2.0.0-alpha.2',
              'public_record_verified': False,
          }

          def zenodo_host(host):
              return host == 'zenodo.org' or (isinstance(host, str) and host.endswith('.zenodo.org'))

          try:
              marker = json.loads(Path('release/formalization-v2-alpha2-public-verify-request.json').read_text(encoding='utf-8'))
              expected_marker = {
                  'schema': 'qikvrt_formalization_v2_alpha2_public_verify_request_v1',
                  'state': 'verify',
                  'confirm': 'VERIFY_ZENODO_FORMALIZATION_V2_ALPHA_2_PUBLIC_RECORD_READ_ONLY',
                  'record_id': 21518464,
                  'doi': '10.5281/zenodo.21518464',
                  'attempt': 2,
              }
              result['marker_matches'] = marker == expected_marker

              manifest_raw = Path('release/formalization-v2-alpha2-zenodo.json').read_bytes()
              manifest = json.loads(manifest_raw)
              software = manifest.get('software')
              if not isinstance(software, dict):
                  raise ValueError('manifest software object is missing')
              expected_metadata = software.get('metadata')
              expected_files = software.get('files')
              if not isinstance(expected_metadata, dict) or not isinstance(expected_files, list):
                  raise ValueError('manifest metadata/files are malformed')
              result['manifest_sha256'] = hashlib.sha256(manifest_raw).hexdigest()

              record_url = 'https://zenodo.org/api/records/21518464'
              request = urllib.request.Request(
                  record_url,
                  method='GET',
                  headers={'Accept': 'application/json', 'User-Agent': 'qikvrt-alpha2-public-verifier'},
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  final = urllib.parse.urlsplit(response.geturl())
                  raw = response.read(16 * 1024 * 1024 + 1)
              if final.scheme != 'https' or not zenodo_host(final.hostname) or len(raw) > 16 * 1024 * 1024:
                  raise ValueError('public record response escaped its bound')
              record = json.loads(raw.decode('utf-8'))
              if not isinstance(record, dict):
                  raise ValueError('public record is not an object')

              metadata = record.get('metadata')
              files = record.get('files')
              if not isinstance(metadata, dict) or not isinstance(files, list):
                  raise ValueError('public metadata/files are malformed')

              identity = {
                  'record_id': int(record.get('id')),
                  'concept_record_id': int(record.get('conceptrecid')),
                  'doi': metadata.get('doi'),
                  'version': metadata.get('version'),
              }
              result['observed_identity'] = identity
              result['identity_matches'] = identity == {
                  'record_id': 21518464,
                  'concept_record_id': 21488115,
                  'doi': '10.5281/zenodo.21518464',
                  'version': '2.0.0-alpha.2',
              }

              metadata_keys = ('title', 'upload_type', 'description', 'creators', 'version')
              metadata_comparison = {}
              for key in metadata_keys:
                  expected_value = expected_metadata.get(key)
                  observed_value = metadata.get(key)
                  metadata_comparison[key] = {
                      'matches': observed_value == expected_value,
                      'expected': expected_value,
                      'observed': observed_value,
                  }
              result['metadata_comparison'] = metadata_comparison
              result['metadata_matches'] = all(item['matches'] for item in metadata_comparison.values())

              expected_by_name = {}
              for entry in expected_files:
                  if not isinstance(entry, dict):
                      raise ValueError('manifest file entry is malformed')
                  name = entry.get('name')
                  if not isinstance(name, str) or name in expected_by_name:
                      raise ValueError('manifest file names are invalid')
                  expected_by_name[name] = entry

              public_by_name = {}
              for item in files:
                  if not isinstance(item, dict):
                      raise ValueError('public file entry is malformed')
                  name = item.get('key', item.get('filename'))
                  if not isinstance(name, str) or name in public_by_name:
                      raise ValueError('public file names are invalid')
                  public_by_name[name] = item

              expected_names = set(expected_by_name)
              public_names = set(public_by_name)
              result['expected_file_count'] = len(expected_names)
              result['public_file_count'] = len(public_names)
              result['missing_public_files'] = sorted(expected_names - public_names)
              result['unexpected_public_files'] = sorted(public_names - expected_names)
              result['file_name_set_matches'] = expected_names == public_names

              receipts = []
              total_bytes = 0
              for name in sorted(expected_names & public_names):
                  expected = expected_by_name[name]
                  public = public_by_name[name]
                  expected_size = expected.get('size')
                  expected_sha256 = expected.get('sha256')
                  public_size = public.get('size')
                  checksum = public.get('checksum')
                  links = public.get('links')
                  url = None
                  if isinstance(links, dict):
                      for candidate in ('self', 'download', 'content'):
                          if isinstance(links.get(candidate), str):
                              url = links[candidate]
                              break
                  receipt = {
                      'name': name,
                      'expected_size': expected_size,
                      'public_size': public_size,
                      'expected_sha256': expected_sha256,
                      'public_md5': checksum[4:] if isinstance(checksum, str) and checksum.startswith('md5:') else None,
                      'size_metadata_matches': public_size == expected_size,
                  }
                  if not isinstance(url, str):
                      receipt['error'] = 'public file URL is missing'
                      receipts.append(receipt)
                      continue
                  parsed = urllib.parse.urlsplit(url)
                  if parsed.scheme != 'https' or not zenodo_host(parsed.hostname):
                      receipt['error'] = 'public file URL escaped Zenodo'
                      receipts.append(receipt)
                      continue

                  download = urllib.request.Request(url, method='GET', headers={'User-Agent': 'qikvrt-alpha2-public-verifier'})
                  md5 = hashlib.md5(usedforsecurity=False)
                  sha256 = hashlib.sha256()
                  size = 0
                  with urllib.request.urlopen(download, timeout=120) as response:
                      final_file = urllib.parse.urlsplit(response.geturl())
                      if final_file.scheme != 'https' or not zenodo_host(final_file.hostname):
                          raise ValueError('public file redirect escaped Zenodo: ' + name)
                      while True:
                          chunk = response.read(1024 * 1024)
                          if not chunk:
                              break
                          size += len(chunk)
                          total_bytes += len(chunk)
                          if size > 256 * 1024 * 1024 or total_bytes > 512 * 1024 * 1024:
                              raise ValueError('public file download exceeded bound: ' + name)
                          md5.update(chunk)
                          sha256.update(chunk)
                  actual_md5 = md5.hexdigest()
                  actual_sha256 = sha256.hexdigest()
                  receipt.update({
                      'downloaded_size': size,
                      'downloaded_md5': actual_md5,
                      'downloaded_sha256': actual_sha256,
                      'size_matches': size == expected_size,
                      'md5_matches_public': receipt['public_md5'] == actual_md5,
                      'sha256_matches_manifest': expected_sha256 == actual_sha256,
                  })
                  receipt['matches'] = all((
                      receipt['size_metadata_matches'],
                      receipt['size_matches'],
                      receipt['md5_matches_public'],
                      receipt['sha256_matches_manifest'],
                  ))
                  receipts.append(receipt)

              result['files'] = receipts
              result['common_file_bytes_match'] = len(receipts) == len(expected_names & public_names) and all(item.get('matches') is True for item in receipts)
              result['status'] = 'PASS' if all((
                  result['marker_matches'],
                  result['identity_matches'],
                  result['metadata_matches'],
                  result['file_name_set_matches'],
                  result['common_file_bytes_match'],
              )) else 'MISMATCH'
              result['public_record_verified'] = result['status'] == 'PASS'
          except Exception as exc:
              result['status'] = 'ERROR'
              result['error_type'] = type(exc).__name__
              result['error'] = str(exc)
              result['traceback_tail'] = traceback.format_exc().splitlines()[-12:]
          finally:
              output.write_text(json.dumps(result, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8')
              print(json.dumps({
                  'status': result.get('status'),
                  'record_id': result.get('record_id'),
                  'file_name_set_matches': result.get('file_name_set_matches'),
                  'metadata_matches': result.get('metadata_matches'),
                  'public_record_verified': result.get('public_record_verified'),
                  'error': result.get('error'),
              }, sort_keys=True))
          PY

      - name: Upload public verification evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-formalization-v2-alpha2-public-verification
          retention-days: 30
          path: .qikvrt/release/formalization-v2-alpha2/public-verification.json
          if-no-files-found: error
