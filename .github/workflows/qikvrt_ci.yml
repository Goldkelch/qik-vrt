name: QIKVRT CI

on:
  push:
    branches-ignore:
      - automation/effect-ack-universality-reserve-20260722
      - automation/effect-ack-universality-finalize-20260722
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Full compile, launcher, protocol, handler, security and TCP/IP tests
        id: full_test
        continue-on-error: true
        shell: bash
        run: |
          set +e
          diagnostics=.qikvrt/runtime/ci-diagnostics
          mkdir -p "$diagnostics"
          make test > "$diagnostics/MAKE_TEST_FULL.log" 2>&1
          status=$?
          {
            printf 'MAKE_TEST_EXIT=%s\n' "$status"
            printf '%s\n' '--- LAST 500 LINES ---'
            tail -n 500 "$diagnostics/MAKE_TEST_FULL.log"
            printf '%s\n' '--- WORKTREE STATUS ---'
            git status --short --untracked-files=all
            printf '%s\n' '--- INTEGRITY MANIFEST DELTA ---'
            python3 -B - <<'PY'
          import json
          from pathlib import Path
          from tools import qikvrt_integrity as integrity

          stored = json.loads(Path(integrity.MANIFEST_NAME).read_text(encoding='utf-8'))
          _manifest, _index, _detached, expected = integrity.build_outputs()
          old = {entry['path']: entry for entry in stored['files']}
          new = {entry['path']: entry for entry in expected['files']}
          print('added=' + json.dumps(sorted(new.keys() - old.keys())))
          print('removed=' + json.dumps(sorted(old.keys() - new.keys())))
          changed = sorted(
              path for path in old.keys() & new.keys()
              if old[path] != new[path]
          )
          print('changed=' + json.dumps(changed))
          for path in changed[:50]:
              before = old[path]
              after = new[path]
              print(json.dumps({'path': path, 'stored': before, 'expected': after}, sort_keys=True))
          PY
          } > "$diagnostics/MAKE_TEST_DIAGNOSTICS.log" 2>&1
          mkdir -p audit/ci-diagnostics
          cp "$diagnostics/MAKE_TEST_DIAGNOSTICS.log" \
            audit/ci-diagnostics/MAKE_TEST_DIAGNOSTICS.log
          cat "$diagnostics/MAKE_TEST_DIAGNOSTICS.log"
          exit "$status"
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-ci-audit
          retention-days: 30
          path: |
            audit/**
            .qikvrt/**
          if-no-files-found: warn
          include-hidden-files: true
      - name: Enforce full repository test result
        if: steps.full_test.outcome == 'failure'
        shell: bash
        run: |
          cat audit/ci-diagnostics/MAKE_TEST_DIAGNOSTICS.log
          exit 1

  compare-ietf-render-locks:
    if: >-
      github.ref_name == 'maintenance/dependency-security-updates-final-20260724' ||
      github.head_ref == 'maintenance/dependency-security-updates-final-20260724'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12.13"
          architecture: x64
      - name: Reproduce published and refreshed renderer locks
        shell: bash
        env:
          PUBLISHED_COMMIT: b872a1bd3a5b86532280adf7557cbf989f8ff5a5
          EXPECTED_PUBLISHED_HTML_SHA256: 974f977d9ea50cfaf4f8d2beea6bb854b3dd7b94ef16b3473bed202aeb67e151
          EXPECTED_PUBLISHED_HTML_SIZE: "103849"
        run: |
          output=/tmp/qikvrt-ietf-render-comparison
          mkdir -p "$output"
          exec > >(tee "$output/TRACE.log") 2>&1
          set -euxo pipefail
          python="$pythonLocation/bin/python"
          source="docs/publications/2026-07-22-effect-ack-universal-effect-control/inputs/draft-lohmann-qikvrt-effect-ack-01.xml"
          old_lock="$output/requirements-published.txt"
          new_lock="runtime/toolchains/requirements-xml2rfc-3.34.0.txt"
          git show "$PUBLISHED_COMMIT:runtime/toolchains/requirements-xml2rfc-3.34.0.txt" > "$old_lock"

          build_renderer() {
            name="$1"
            lock="$2"
            root="$output/$name"
            wheelhouse="$root/wheelhouse"
            venv="$root/venv"
            mkdir -p "$wheelhouse"
            "$python" -I -m pip --isolated --disable-pip-version-check download \
              --index-url https://pypi.org/simple --dest "$wheelhouse" \
              --only-binary=:all: --require-hashes --no-deps -r "$lock"
            "$python" -I -m venv --copies "$venv"
            "$venv/bin/python" -I -m pip --isolated --disable-pip-version-check install \
              --no-index --find-links "$wheelhouse" --only-binary=:all: \
              --require-hashes --no-deps --require-virtualenv -r "$lock"
          }

          build_renderer published "$old_lock"
          build_renderer refreshed "$new_lock"

          render() {
            name="$1"
            renderer="$output/$name/venv/bin/xml2rfc"
            cache="$output/$name/cache"
            mkdir -p "$cache"
            "$renderer" "$source" --v3 --text --no-network --skip-config-files \
              --warn-bare-unicode --cache "$cache" --verbose --out "$output/$name.txt"
            "$renderer" "$source" --v3 --html --no-network --skip-config-files \
              --warn-bare-unicode --cache "$cache" --verbose --out "$output/$name.html"
          }

          render published
          render refreshed
          sha256sum "$output/published.txt" "$output/refreshed.txt" \
            "$output/published.html" "$output/refreshed.html" | tee "$output/SHA256SUMS"
          wc -c "$output/published.txt" "$output/refreshed.txt" \
            "$output/published.html" "$output/refreshed.html" | tee "$output/SIZES.txt"

          published_sha="$(sha256sum "$output/published.html" | awk '{print $1}')"
          published_size="$(wc -c < "$output/published.html" | tr -d ' ')"
          test "$published_sha" = "$EXPECTED_PUBLISHED_HTML_SHA256"
          test "$published_size" = "$EXPECTED_PUBLISHED_HTML_SIZE"
          cmp "$output/published.txt" "$output/refreshed.txt"

          "$python" -I -S -B - "$output" <<'PY'
          from __future__ import annotations

          import difflib
          import hashlib
          import json
          from pathlib import Path
          import sys

          root = Path(sys.argv[1])
          old = (root / 'published.html').read_bytes()
          new = (root / 'refreshed.html').read_bytes()
          differing = [i for i, (a, b) in enumerate(zip(old, new)) if a != b]
          summary = {
              'published_sha256': hashlib.sha256(old).hexdigest(),
              'refreshed_sha256': hashlib.sha256(new).hexdigest(),
              'published_size': len(old),
              'refreshed_size': len(new),
              'differing_byte_count': len(differing) + abs(len(old) - len(new)),
              'first_differing_offsets': differing[:100],
          }
          (root / 'comparison.json').write_text(
              json.dumps(summary, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          diff = difflib.unified_diff(
              old.decode('utf-8').splitlines(keepends=True),
              new.decode('utf-8').splitlines(keepends=True),
              fromfile='published-pypdf-6.10.0.html',
              tofile='refreshed-pypdf-6.14.2.html',
          )
          (root / 'render.diff').write_text(''.join(diff), encoding='utf-8')
          print(json.dumps(summary, sort_keys=True))
          PY
      - name: Upload two-lock IETF render comparison
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-ietf-two-lock-render-comparison
          retention-days: 30
          path: |
            /tmp/qikvrt-ietf-render-comparison/TRACE.log
            /tmp/qikvrt-ietf-render-comparison/SHA256SUMS
            /tmp/qikvrt-ietf-render-comparison/SIZES.txt
            /tmp/qikvrt-ietf-render-comparison/comparison.json
            /tmp/qikvrt-ietf-render-comparison/render.diff
            /tmp/qikvrt-ietf-render-comparison/published.html
            /tmp/qikvrt-ietf-render-comparison/refreshed.html
          if-no-files-found: error
