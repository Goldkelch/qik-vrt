name: QIKVRT CI

on:
  push:
    branches-ignore:
      - automation/effect-ack-universality-reserve-20260722
      - automation/effect-ack-universality-finalize-20260722
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Full compile, launcher, protocol, handler, security and TCP/IP tests
        run: make test
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-ci-audit
          retention-days: 30
          path: |
            audit/**
            .qikvrt/**
          if-no-files-found: warn
