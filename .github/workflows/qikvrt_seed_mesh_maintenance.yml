name: QIKVRT Seed Mesh Maintenance
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: QIKVRT run id
        required: false
        type: string
  schedule:
    - cron: '37 */6 * * *'
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      QIKVRT_RUN_ID: ${{ inputs.run_id || github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Run QIKVRT Seed Mesh Maintenance
        run: sh tools/qikvrt_seed_mesh_maintenance.sh
      - name: Commit QIKVRT outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry evidence || true
          if git diff --cached --quiet; then
            echo "QIKVRT_NO_CHANGES"
          else
            git commit -m "QIKVRT 4AU QIKVRT Seed Mesh Maintenance $QIKVRT_RUN_ID"
            git push
          fi
