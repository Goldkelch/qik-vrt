name: QIK-VRT repository mesh sync diagnostic

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - .github/workflows/qikvrt_repository_mesh_sync_diagnose.yml

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'automation/repository-mesh-sync-materialize-20260724'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Print the bounded failure tail
        shell: bash
        env:
          GH_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_API_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Goldkelch/qik-vrt/actions/jobs/89552891892/logs' \
            -o /tmp/materializer.log
          python3 -B - <<'PY'
          from pathlib import Path
          lines = Path('/tmp/materializer.log').read_text(encoding='utf-8-sig', errors='replace').splitlines()
          selected = [line for line in lines if any(token in line for token in ('BLOCK:', 'Traceback', 'SyntaxError', 'Error:', 'Exception', 'rejected', 'denied', 'refusing', 'permission'))]
          print('--- selected failure lines ---')
          print('\n'.join(selected[-40:]) or '(none)')
          print('--- final log tail ---')
          print('\n'.join(lines[-70:]))
          PY
